<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sofi Builders and Developers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  background:black;
  border-bottom:2px solid gold;
}

header h1 {
  color:gold;
}

/* HERO */
.hero {
  background:url('building.jpg') no-repeat center/cover;
  height:300px;
}

/* SECTION */
.section {
  padding:20px;
  text-align:center;
}

/* SERVICES */
.services {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  width:200px;
  border-radius:10px;
  border:1px solid gold;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* GALLERY */
.gallery {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.gallery img {
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
  border:2px solid gold;
}

/* BUTTON */
.btn {
  background:gold;
  color:black;
  padding:10px 15px;
  text-decoration:none;
  border-radius:5px;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:black;
  text-align:center;
  padding:10px;
  border-top:2px solid gold;
}
</style>
</head>

<body>

<header>
  <h1>Sofi Builders and Developers</h1>
  <p>Premium Construction Services 🏗️</p>
</header>

<div class="hero"></div>

<div class="section">
  <h2>About Us</h2>
  <p>We build modern homes, buildings and provide trusted construction services.</p>
</div>

<div class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">🏠 House Construction</div>
    <div class="card">🏢 Commercial Buildings</div>
    <div class="card">🛠 Renovation</div>
  </div>
</div>

<div class="section">
  <h2>Our Work</h2>
  <div class="gallery">
    <img src="building.jpg">
    <img src="building.jpg">
    <img src="building.jpg">
  </div>
</div>

<div class="section">
  <h2>Contact Us</h2>
  <a class="btn" href="https://wa.me/917780263982">WhatsApp Now</a>
</div>

<a class="whatsapp" href="https://wa.me/917780263983">💬</a>

<footer>
  <p>© 2026 Sofi Builders and Developers</p>
</footer>

</body>
</html>
