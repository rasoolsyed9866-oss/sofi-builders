<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sofi Builders and Developers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#ffffff;
  color:#333;
}

/* HEADER */
header {
  background:#222;
  color:white;
  padding:15px;
  text-align:center;
}

/* HERO IMAGE */
.hero img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* SECTION */
.section {
  padding:20px;
  text-align:center;
}

/* SERVICES */
.services {
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.card {
  background:#f5f5f5;
  padding:15px;
  width:200px;
  border-radius:8px;
}

/* IMAGE */
.main-img {
  width:90%;
  max-width:400px;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
.btn {
  display:inline-block;
  background:#25D366;
  color:white;
  padding:10px 15px;
  text-decoration:none;
  border-radius:5px;
}

/* FOOTER */
footer {
  background:#222;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <h1>Sofi Builders and Developers</h1>
  <p>We Build Your Dreams</p>
</header>

<!-- HERO -->
<div class="hero">
  <img src="building.jpg">
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Us</h2>
  <p>We provide quality construction services with trust and experience.</p>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">House Construction</div>
    <div class="card">Building Work</div>
    <div class="card">Renovation</div>
  </div>
</div>

<!-- REAL IMAGE -->
<div class="section">
  <h2>Our Work</h2>
  <img src="building.jpg" class="main-img">
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Contact</h2>
  <a class="btn" href="https://wa.me/917780263982">Chat on WhatsApp</a>
</div>

<footer>
  <p>© 2026 Sofi Builders</p>
</footer>

</body>
</html>
