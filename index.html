<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sofi Builders and Developers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
}

/* NAVBAR */
.nav {
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.nav a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

/* SLIDER */
.slider {
  width:100%;
  height:400px;
  overflow:hidden;
}

.slides {
  display:flex;
  width:300%;
  animation:slide 9s infinite;
}

.slides img {
  width:100%;
  height:400px;
  object-fit:cover;
}

@keyframes slide {
  0% {margin-left:0;}
  33% {margin-left:-100%;}
  66% {margin-left:-200%;}
}

/* SECTION */
.section {
  padding:30px;
  text-align:center;
}

/* SERVICES */
.services {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background:#f5f5f5;
  padding:20px;
  width:220px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* BUTTON */
.btn {
  background:#25D366;
  color:white;
  padding:12px 25px;
  border-radius:30px;
  text-decoration:none;
}

/* MAP */
iframe {
  width:100%;
  height:250px;
  border:0;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <h2>Sofi Builders</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- IMAGE SLIDER -->
<div class="slider">
  <div class="slides">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
    <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd">
    <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab">
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Us</h2>
  <p>We provide modern construction with quality and trust.</p>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">🏠 House Construction</div>
    <div class="card">🏢 Commercial Buildings</div>
    <div class="card">🛠 Renovation</div>
  </div>
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Contact Us</h2>
  <a class="btn" href="https://wa.me/917780263982">Chat on WhatsApp</a>
</div>

<!-- MAP -->
<div class="section">
  <h2>Our Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hyderabad&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<!-- FLOATING WHATSAPP -->
<a class="whatsapp" href="https://wa.me/917780263982">💬</a>

<footer>
  <p>© 2026 Sofi Builders and Developers</p>
</footer>

</body>
</html>
