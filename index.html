<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sofi Builders and Developers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header {
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
}

/* LOGO */
.logo {
  width:60px;
}

/* HERO */
.hero {
  background:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') no-repeat center/cover;
  height:250px;
}

/* SECTION */
.section {
  padding:20px;
  text-align:center;
}

/* SERVICES */
.services {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  width:200px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* GALLERY */
.gallery img {
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* BUTTON */
.btn {
  background:green;
  color:white;
  padding:10px 15px;
  text-decoration:none;
  border-radius:5px;
}

/* MAP */
iframe {
  width:100%;
  height:250px;
  border:0;
  border-radius:10px;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <img class="logo" src="https://cdn-icons-png.flaticon.com/512/1995/1995539.png">
  <h1>Sofi Builders and Developers</h1>
  <p>We Build Your Dreams 🏠</p>
</header>

<div class="hero"></div>

<!-- ABOUT -->
<div class="section">
  <h2>About Us</h2>
  <p>We provide high-quality construction services with trust and experience.</p>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">🏗️ House Construction</div>
    <div class="card">🏢 Building Work</div>
    <div class="card">🛠️ Renovation</div>
  </div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Our Work</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
    <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd">
    <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab">
  </div>
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Contact Us</h2>
  <a class="btn" href="https://wa.me/917780263982" target="_blank">
    Chat on WhatsApp
  </a>
</div>

<!-- GOOGLE MAP -->
<div class="section">
  <h2>Our Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hyderabad&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<!-- FLOATING WHATSAPP -->
<a class="whatsapp" href="https://wa.me/917780263982" target="_blank">💬</a>

<footer>
  <p>© 2026 Sofi Builders and Developers</p>
</footer>

</body>
</html>
